<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found | Tahir Alakbarli</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #f5f7fa;
      color: #081426;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
    }
    main {
      width: min(560px, 100%);
      padding: 48px 28px;
      border: 1px solid #dce3ed;
      border-radius: 22px;
      background: #ffffff;
      box-shadow: 0 18px 50px rgba(8, 20, 38, 0.10);
    }
    p:first-child {
      margin: 0 0 12px;
      color: #ff9900;
      font-size: 0.78rem;
      font-weight: 850;
      letter-spacing: 0.12em;
    }
    h1 { margin: 0 0 16px; font-size: clamp(2rem, 8vw, 4rem); }
    p { color: #5f6d82; }
    a {
      display: inline-block;
      margin-top: 14px;
      padding: 12px 20px;
      border-radius: 10px;
      background: #081426;
      color: #ffffff;
      font-weight: 750;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <p>ERROR 404</p>
    <h1>Page not found.</h1>
    <p>The address may be incorrect or the page may have moved.</p>
    <a href="/">Return home</a>
  </main>
</body>
</html>
